apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-api-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fraud-api
  template:
    metadata:
      labels:
        app: fraud-api
    spec:
      containers:
      - name: fraud-api-container
        image: fraud-prediction-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-api-service
spec:
  type: NodePort
  selector:
    app: fraud-api
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30080